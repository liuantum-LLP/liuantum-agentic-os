name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS 14.5 / Ubuntu 22.04 / Windows 11
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Liuant Version
      description: Output of `./liuant version`
      placeholder: 0.8.0
    validations:
      required: true
  - type: input
    id: cli_command
    attributes:
      label: CLI Command
      description: The exact command you ran
      placeholder: ./liuant image generate "test" --mode model_based
  - type: textarea
    id: output
    attributes:
      label: Output (secrets removed)
      description: Paste the full output. Remove all API keys, tokens, and personal data.
      render: shell
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Run `./liuant start 8765`
        2. Open browser at http://127.0.0.1:8765
        3. Click "Generate Image"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
