name: Documentation Improvement
description: Suggest improvements to documentation
labels: [documentation]
body:
  - type: input
    id: page
    attributes:
      label: Documentation Page
      placeholder: docs/INSTALLATION.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is missing or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
