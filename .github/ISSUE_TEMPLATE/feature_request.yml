name: Feature Request
description: Suggest an idea for this project
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety Check
      options:
        - label: This feature does NOT enable auto-sending email or auto-publishing social posts without approval
          required: true
        - label: This feature does NOT require cloud AI for core functionality
